name: Validate Kubernetes manifests
description: Validate Flux custom resources and kustomize overlays against the Flux Schema catalog
author: Stefan Prodan
branding:
  color: blue
  icon: check-circle
inputs:
  path:
    description: Root directory to validate (relative to the repository root)
    required: false
    default: "."
  exclude:
    description: Newline-separated list of directories to exclude from validation
    required: false
    default: ""
  config:
    description: |
      Path to a flux-schema config file (relative to the repository root).
      When the file does not exist, the default Flux Schema catalog will be used.
    required: false
    default: ".fluxschema.yml"
  output-bundle:
    description: |
      Path to a file where all standalone manifests and rendered kustomize
      overlays are merged as a single YAML document stream with provenance
      comments. Use a dot-prefixed name (e.g. '.bundle.yaml') so the bundle
      is ignored by validation and discovery. When empty, no bundle is written.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Validate manifests
      shell: bash
      env:
        ROOT_DIR: ${{ inputs.path }}
        EXCLUDE_DIRS: ${{ inputs.exclude }}
        CONFIG_FILE: ${{ inputs.config }}
        BUNDLE_FILE: ${{ inputs.output-bundle }}
      run: |
        set -euo pipefail
        args=("-d" "$ROOT_DIR" "-c" "$CONFIG_FILE")
        if [[ -n "$EXCLUDE_DIRS" ]]; then
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            args+=("-e" "$line")
          done <<< "$EXCLUDE_DIRS"
        fi
        if [[ -n "$BUNDLE_FILE" ]]; then
          args+=("-b" "$BUNDLE_FILE")
        fi
        "${GITHUB_ACTION_PATH}/validate.sh" "${args[@]}"
