name: test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Test suite setup
        uses: fluxcd/gha-workflows/.github/actions/setup-kubernetes@v0.12.0
        with:
          go-version: 1.26.x
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@dcc7def046cba2fe8d15d9737a4c250100f62fe0 # v2.9.0
      - name: Run shellcheck
        run: shellcheck scripts/*.sh actions/validate/*.sh
      - name: Run tests
        run: make test
      - name: Run linters
        run: make lint
      - name: Build binary
        run: make build
      - name: Add flux-schema to PATH
        run: echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"
      - name: Run smoke test
        run: |
          flux install --export | flux-schema validate -v --schema-location ./catalog/latest
      - name: Checkout example repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: fluxcd/flux2-kustomize-helm-example
          path: example
      - name: Test validate action
        uses: ./actions/validate
        with:
          path: example
      - name: Build Docker image
        run: make docker-build
      - name: Run Docker smoke test
        run: |
          flux install --export | docker run --rm -i ghcr.io/fluxcd/flux-schema:latest-dev \
            validate -v --schema-location /catalog/latest
      - name: Check if working tree is dirty
        run: |
          if [[ $(git diff --stat) != '' ]]; then
            git --no-pager diff
            echo 'run make test and commit changes'
            exit 1
          fi
